services:
  calorieguide-db:
    image: postgres:16
    container_name: calorieguide-db
    environment:
      POSTGRES_USER: pgs
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: pgs
    ports:
      - '5432:5432'
    volumes:
      - ./_data/payment_data:/var/lib/postgresql/data
      - ./sql_scripts/payment:/docker-entrypoint-initdb.d

  calorie_guide:
    container_name: calorie_guide
    build: app/
    ports: 
      - "8088:8088"
    environment:
      jwt_key: ${jwt_key}
      address: ${address}
      password: ${password}
      username: ${username}
      db: ${db}
    depends_on:
      - calorieguide-db
